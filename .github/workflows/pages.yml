name: Deploy Portal UI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout DockLayout
        uses: actions/checkout@v4
        with:
          repository: omkar-tenkale/DockLayout
          path: docklayout-source

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish DockLayout locally
        working-directory: docklayout-source
        env:
          GROUP: io.github.omkar-tenkale.DockLayout
          VERSION: -SNAPSHOT
          POM_URL: https://github.com/omkar-tenkale/DockLayout
        run: ./gradlew :docklayout:publishToMavenLocal

      - name: Build Portal UI
        run: ./gradlew :app:wasmJsBrowserDistribution

      - name: Add direct route entry points
        run: |
          cd app/build/dist/wasmJs/productionExecutable
          mkdir -p connect
          find . -maxdepth 1 -type f -exec cp {} connect/ \;
          cp index.html 404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/dist/wasmJs/productionExecutable

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
